<h2 mat-dialog-title>{{dialog.header}}</h2>
<span *ngIf="dialog.text" > {{dialog.text}} </span>
<ul *ngIf="dialog.elem" > 
  <li *ngFor="let el of dialog.elem">
    {{el}}
  </li>
</ul>
<mat-dialog-actions align="center">
  <button mat-button [mat-dialog-close]="true" cdkFocusInitial>{{dialog.b1}}</button>
  <button *ngIf="dialog.b2" mat-button mat-dialog-close>{{dialog.b2}}</button>
</mat-dialog-actions>
